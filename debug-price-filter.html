<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test - Filtro de Precio</title>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/ui-lightness/jquery-ui.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .price-filter-test {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .price_slider {
            height: 6px;
            background: #e2e8f0;
            border-radius: 3px;
            margin: 20px 0;
            position: relative;
        }
        .price_slider .ui-slider-range {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            border-radius: 3px;
            height: 100%;
        }
        .price_slider .ui-slider-handle {
            width: 20px;
            height: 20px;
            background: #ffffff;
            border: 3px solid #3b82f6;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            top: -7px;
            position: absolute;
            z-index: 2;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
        }
        .price_slider .ui-slider-handle:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.5);
            border-color: #2563eb;
        }
        .price_label {
            font-weight: 600;
            color: #374151;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        input[type="number"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Test del Filtro de Precio</h1>
    
    <div class="price-filter-test">
        <h3>Filtro de Precio</h3>
        
        <div class="price_slider"></div>
        
        <div class="price_label">
            Precio: <span class="from">$0</span> — <span class="to">$10000</span>
        </div>
        
        <div class="input-group">
            <input type="number" id="min_price" placeholder="Precio mínimo" data-min="0" data-max="10000" value="0">
            <input type="number" id="max_price" placeholder="Precio máximo" data-min="0" data-max="10000" value="10000">
        </div>
        
        <button onclick="applyFilter()">Aplicar Filtro</button>
    </div>
    
    <script>
        $(document).ready(function() {
            console.log('Iniciando test del slider de precio...');
            
            var $minInput = $('#min_price');
            var $maxInput = $('#max_price');
            var $slider = $('.price_slider');
            
            var min_price = parseInt($minInput.data('min'), 10) || 0;
            var max_price = parseInt($maxInput.data('max'), 10) || 10000;
            var current_min_price = parseInt($minInput.val(), 10) || min_price;
            var current_max_price = parseInt($maxInput.val(), 10) || max_price;
            
            console.log('Rangos de precio:', {min_price, max_price, current_min_price, current_max_price});
            
            function formatPrice(val) {
                return '$' + Number(val || 0).toLocaleString();
            }
            
            function updateLabel(minV, maxV) {
                $('.price_label .from').text(formatPrice(minV));
                $('.price_label .to').text(formatPrice(maxV));
            }
            
            $slider.slider({
                range: true,
                animate: true,
                min: min_price,
                max: max_price,
                values: [current_min_price, current_max_price],
                create: function() {
                    console.log('Slider creado');
                    $minInput.val(current_min_price);
                    $maxInput.val(current_max_price);
                    updateLabel(current_min_price, current_max_price);
                },
                slide: function (event, ui) {
                    console.log('Deslizando:', ui.values);
                    $minInput.val(ui.values[0]);
                    $maxInput.val(ui.values[1]);
                    updateLabel(ui.values[0], ui.values[1]);
                },
                change: function(event, ui) {
                    console.log('Valor cambiado:', ui.values);
                }
            });
            
            // Actualizar slider cuando cambien los inputs
            $minInput.on('change input', function() {
                var value = parseInt($(this).val(), 10);
                if (!isNaN(value) && value >= min_price && value <= max_price) {
                    var maxVal = parseInt($maxInput.val(), 10) || max_price;
                    if (value <= maxVal) {
                        $slider.slider('values', [value, maxVal]);
                        updateLabel(value, maxVal);
                    }
                }
            });
            
            $maxInput.on('change input', function() {
                var value = parseInt($(this).val(), 10);
                if (!isNaN(value) && value >= min_price && value <= max_price) {
                    var minVal = parseInt($minInput.val(), 10) || min_price;
                    if (value >= minVal) {
                        $slider.slider('values', [minVal, value]);
                        updateLabel(minVal, value);
                    }
                }
            });
        });
        
        function applyFilter() {
            var minPrice = document.getElementById('min_price').value;
            var maxPrice = document.getElementById('max_price').value;
            console.log('Aplicando filtro:', {minPrice, maxPrice});
            alert('Filtro aplicado: $' + minPrice + ' - $' + maxPrice);
        }
    </script>
</body>
</html>
